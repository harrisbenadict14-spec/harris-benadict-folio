version: "3.8"

services:
  folio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-harris-benadict-folio}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-10001}:80"
    environment:
      - TZ=UTC
    volumes:
      - folio-nginx-cache:/var/cache/nginx
    networks:
      - folio-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  folio-nginx-cache:
    driver: local

networks:
  folio-net:
    name: ${NETWORK_NAME:-folio-network}
    driver: bridge
